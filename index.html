<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Invite to Birthday Party</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins,sans-serif;background:linear-gradient(135deg,#ffd6e7,#ffeef6);overflow:hidden}
#envelope{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center}
.env{width:220px;height:140px;background:#f8a8c8;border-radius:8px;position:relative;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,.2)}
.env:before{content:"";position:absolute;left:0;right:0;top:0;border-left:110px solid transparent;border-right:110px solid transparent;border-top:75px solid #f48fb1;transform-origin:top;transition:.6s}
.env.open:before{transform:rotateX(180deg)}
.tap{margin-top:20px;color:#b04}
#cardwrap{display:none;height:100vh;display:flex;justify-content:center;align-items:center}
#card{width:min(92vw,460px);height:min(90vh,760px);background:rgba(255,255,255,.78);backdrop-filter:blur(12px);border-radius:26px;padding:18px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;box-shadow:0 12px 35px rgba(0,0,0,.18)}
h1{font-family:"Great Vibes";font-size:48px;color:#d63384;text-align:center;line-height:1}
.sub{text-align:center;color:#a53d6b;font-weight:600;font-size:16px}
img{width:170px;height:220px;object-fit:cover;border-radius:18px;border:5px solid #fff;box-shadow:0 10px 25px rgba(255,105,180,.35)}
.info{text-align:center;font-size:15px}
.btn{display:inline-block;padding:12px 22px;background:#ff5f9e;color:#fff;text-decoration:none;border-radius:30px;font-weight:600}
.balloon,.heart{position:fixed;pointer-events:none}
.balloon{bottom:-60px;font-size:34px;animation:up 10s linear infinite}
.heart{top:-20px;font-size:18px;color:#ff4d88;animation:down 6s linear infinite}
@keyframes up{to{transform:translateY(-120vh)}}@keyframes down{to{transform:translateY(110vh)}}
</style></head><body>
<div id="envelope"><div id="env" class="env"></div><div class="tap">💌 Tap the envelope to open</div></div>
<div id="cardwrap"><div id="card">
<h1>Invite to<br>Birthday Party</h1>
<div class="sub">💖 Mời em bé tới dự tiệc<br>sinh nhật của chính mình 💖</div>
<img src="cover.jpg">
<div class="info"><b>🕖 Sunday • 07:00 AM</b></div>
<a class="btn" target="_blank" href="https://maps.app.goo.gl/mFUsYrBeJQkndbBY6">📍 Open Google Maps</a>
<div class="info">Your presence will be the most wonderful gift.<br>Can't wait to celebrate with you! 💕</div>
</div></div>
<script>
const env=document.getElementById('env');
env.onclick=()=>{
 env.classList.add('open');
 document.getElementById('envelope').style.display='none';
 document.getElementById('cardwrap').style.display='flex';
 for(let i=0;i<15;i++){let b=document.createElement('div');b.className='balloon';b.textContent='🎈';b.style.left=Math.random()*100+'vw';b.style.animationDuration=(8+Math.random()*4)+'s';document.body.appendChild(b);}
 for(let i=0;i<25;i++){let h=document.createElement('div');h.className='heart';h.textContent='❤';h.style.left=Math.random()*100+'vw';h.style.animationDuration=(4+Math.random()*3)+'s';document.body.appendChild(h);}
}
</script></body></html>
